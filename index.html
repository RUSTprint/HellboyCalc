<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Kalkulator Oględzin + Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .app-card { width: 100%; max-width: 600px; margin: 0 auto; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
        .header { background: var(--primary); color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        
        .point-row { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; border-left: 4px solid #cbd5e1; }
        .point-row.ready { border-left-color: #10b981; }
        
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 5px; }
        .input-row { display: flex; gap: 5px; margin-bottom: 8px; }
        input { padding: 10px; border: 2px solid #f1f5f9; border-radius: 8px; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }
        .input-zip { flex: 1; }
        .input-city { flex: 2; }

        .btn-check { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-check.verified { background: #10b981; }

        #map { height: 250px; width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #e2e8f0; display: none; }

        .btn-add { width: 100%; padding: 14px; background: #e2e8f0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 10px 0; color: #475569; }
        
        .summary-box { background: #1e293b; color: white; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .sum-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; opacity: 0.8; }
        .route-info { font-size: 11px; color: #34d399; margin-bottom: 10px; font-weight: bold; border: 1px dashed #34d399; padding: 5px; border-radius: 4px; text-align: center; }
        .sum-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; font-size: 1.3rem; font-weight: bold; color: #34d399; }
        .remove-btn { position: absolute; top: 8px; right: 8px; color: #ef4444; border: none; background: none; font-size: 16px; cursor: pointer; }
        
        .loader { width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2 style="margin:0; font-size: 17px;">Kalkulator Trasy z Mapą</h2>
        <div style="font-size: 11px; opacity: 0.9;">Start/Powrót: Fuchsbreite 39, 37181 Hardegsen</div>
    </div>

    <div id="points-list"></div>
    <button class="btn-add" onclick="addNewPoint()">+ DODAJ KOLEJNY PUNKT</button>

    <div class="summary-box">
        <div id="route-label" class="route-info" style="display:none;">🔄 TRASA ZAWIERA POWRÓT DO BAZY</div>
        <div class="sum-line"><span>Dystans całkowity:</span> <b id="total-dist">0 km</b></div>
        <div class="sum-line"><span>Szacowany czas:</span> <b id="total-time">0h 0m</b></div>
        <div class="sum-line"><span>Koszt dojazdu (min. 25€):</span> <b id="total-fuel">0,00 €</b></div>
        <div class="sum-line"><span>Inspekcje (85€/szt):</span> <b id="total-insp">0,00 €</b></div>
        <div class="sum-total"><span>DO ZAPŁATY:</span> <span id="total-all">0,00 €</span></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HOME = { lat: 51.6517, lng: 9.8294 };
const PRICE_KM = 0.49;
const PRICE_INSP = 85.00;

let map, routeLayer;

// Inicjalizacja mapy
function initMap() {
    map = L.map('map').setView([HOME.lat, HOME.lng], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OSM'
    }).addTo(map);
    L.marker([HOME.lat, HOME.lng]).addTo(map).bindPopup("Twoja Baza (Hardegsen)");
}

function addNewPoint() {
    const id = Date.now();
    const html = `
        <div class="point-row" id="row-${id}">
            <button class="remove-btn" onclick="removePoint(${id})">×</button>
            <label>Lokalizacja oględzin:</label>
            <div class="input-row">
                <input type="number" class="input-zip" id="zip-${id}" placeholder="PLZ">
                <input type="text" class="input-city" id="city-${id}" placeholder="Miasto">
            </div>
            <button class="btn-check" id="btn-${id}" onclick="verifyAndCalc(${id})">Zatwierdź i pokaż trasę</button>
            <input type="hidden" id="lat-${id}"><input type="hidden" id="lng-${id}">
            <div id="stats-${id}" style="font-size:11px; margin-top:5px; color:#2563eb; font-weight:bold; display:none;">Punkt aktywny</div>
        </div>
    `;
    document.getElementById('points-list').insertAdjacentHTML('beforeend', html);
}

function removePoint(id) {
    document.getElementById(`row-${id}`).remove();
    calculateTotal();
}

async function verifyAndCalc(id) {
    const zip = document.getElementById(`zip-${id}`).value;
    const city = document.getElementById(`city-${id}`).value;
    const btn = document.getElementById(`btn-${id}`);
    
    if(!zip || !city) return;
    btn.innerHTML = '<span class="loader"></span> Szukam...';
    
    try {
        const res = await fetch(`https://photon.komoot.io/api/?q=${zip}+${city}&limit=1&countrycode=de`);
        const data = await res.json();
        
        if(data.features && data.features.length > 0) {
            const coord = data.features[0].geometry.coordinates;
            document.getElementById(`lat-${id}`).value = coord[1];
            document.getElementById(`lng-${id}`).value = coord[0];
            
            btn.innerText = "✓ Punkt dodany";
            btn.classList.add('verified');
            document.getElementById(`row-${id}`).classList.add('ready');
            document.getElementById(`stats-${id}`).style.display = 'block';
            
            calculateTotal();
        } else {
            alert("Nie znaleziono miejsca. Sprawdź dane.");
            btn.innerText = "Zatwierdź";
        }
    } catch(e) { btn.innerText = "Zatwierdź"; }
}

async function calculateTotal() {
    const rows = Array.from(document.querySelectorAll('.point-row.ready'));
    let coords = [[HOME.lng, HOME.lat]];
    
    rows.forEach(row => {
        const id = row.id.split('-')[1];
        coords.push([
            parseFloat(document.getElementById(`lng-${id}`).value),
            parseFloat(document.getElementById(`lat-${id}`).value)
        ]);
    });

    if(rows.length === 0) {
        if(routeLayer) map.removeLayer(routeLayer);
        document.getElementById('map').style.display = 'none';
        document.getElementById('route-label').style.display = 'none';
        resetSummary();
        return;
    }
    
    // ZAMKNIĘCIE PĘTLI
    coords.push([HOME.lng, HOME.lat]);
    const coordsStr = coords.map(c => c.join(',')).join(';');

    try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsStr}?overview=full&geometries=geojson`);
        const data = await res.json();
        
        if(data.routes && data.routes[0]) {
            const r = data.routes[0];
            const dist = r.distance / 1000;
            const fuel = Math.max(25, dist * PRICE_KM);
            const insp = rows.length * PRICE_INSP;

            // UI Update
            document.getElementById('total-dist').innerText = dist.toFixed(1) + ' km';
            document.getElementById('total-time').innerText = Math.floor(r.duration/3600) + 'h ' + Math.floor((r.duration%3600)/60) + 'm';
            document.getElementById('total-fuel').innerText = fuel.toFixed(2) + ' €';
            document.getElementById('total-insp').innerText = insp.toFixed(2) + ' €';
            document.getElementById('total-all').innerText = (fuel + insp).toFixed(2) + ' €';
            document.getElementById('route-label').style.display = 'block';

            // Mapa Update
            document.getElementById('map').style.display = 'block';
            if(!map) initMap();
            if(routeLayer) map.removeLayer(routeLayer);

            routeLayer = L.geoJSON(r.geometry, {
                style: { color: '#2563eb', weight: 5, opacity: 0.7 }
            }).addTo(map);
            
            map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
        }
    } catch(e) { console.error(e); }
}

function resetSummary() {
    document.getElementById('total-dist').innerText = '0 km';
    document.getElementById('total-fuel').innerText = '0,00 €';
    document.getElementById('total-insp').innerText = '0,00 €';
    document.getElementById('total-all').innerText = '0,00 €';
}

addNewPoint();
</script>
</body>
</html>
