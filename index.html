<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Kalkulator Oględzin - Fast Mode</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app-card { width: 100%; max-width: 500px; margin: 0 auto; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; position: relative; }
        
        .point-row { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; border-left: 4px solid #cbd5e1; }
        .point-row.ready { border-left-color: #10b981; }
        
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 5px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { padding: 12px; border: 2px solid #f1f5f9; border-radius: 8px; font-size: 16px; outline: none; }
        .input-zip { width: 35%; }
        .input-city { width: 65%; }

        .btn-check { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-check.verified { background: #10b981; }

        .row-stats { display: flex; gap: 8px; margin-top: 10px; display: none; }
        .stat-badge { background: #f8fafc; border: 1px solid #e2e8f0; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #475569; }

        .btn-add { width: 100%; padding: 16px; background: #e2e8f0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 10px 0; color: #475569; }
        
        .summary-box { background: #1e293b; color: white; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .sum-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        .sum-total { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; font-size: 1.5rem; font-weight: bold; color: #34d399; }
        .remove-btn { position: absolute; top: 10px; right: 10px; color: #ef4444; border: none; background: none; font-size: 12px; cursor: pointer; }
        
        .loader { display: none; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">Kalkulator Oględzin - Fast Mode</h2>
        <div style="font-size: 11px; opacity: 0.9; margin-top: 5px;">📍 Hardegsen, Fuchsbreite 39</div>
    </div>

    <div id="points-list"></div>

    <button class="btn-add" onclick="addNewPoint()">+ DODAJ KOLEJNY PUNKT</button>

    <div class="summary-box">
        <div class="sum-line"><span>Dystans całkowity:</span> <b id="total-dist">0 km</b></div>
        <div class="sum-line"><span>Czas jazdy:</span> <b id="total-time">0h 0m</b></div>
        <div class="sum-line"><span>Koszt paliwa:</span> <b id="total-fuel">0,00 €</b></div>
        <div class="sum-line"><span>Inspekcje:</span> <b id="total-insp">0,00 €</b></div>
        <div class="sum-total"><span>ŁĄCZNIE:</span> <span id="total-all">0,00 €</span></div>
    </div>
</div>

<script>
const HOME = { lat: 51.6517, lng: 9.8294 };
const PRICE_KM = 0.49;
const PRICE_INSP = 85.00;

function addNewPoint() {
    const id = Date.now();
    const html = `
        <div class="point-row" id="row-${id}">
            <button class="remove-btn" onclick="removePoint(${id})">Usuń ×</button>
            <label>Miejsce oględzin:</label>
            <div class="input-row">
                <input type="number" class="input-zip" id="zip-${id}" placeholder="PLZ">
                <input type="text" class="input-city" id="city-${id}" placeholder="Miasto">
            </div>
            <button class="btn-check" id="btn-${id}" onclick="verifyAndCalc(${id})">Zatwierdź punkt</button>
            <input type="hidden" id="lat-${id}">
            <input type="hidden" id="lng-${id}">
            <div class="row-stats" id="stats-${id}">
                <div class="stat-badge" id="dist-badge-${id}">-- km</div>
            </div>
        </div>
    `;
    document.getElementById('points-list').insertAdjacentHTML('beforeend', html);
}

function removePoint(id) {
    document.getElementById(`row-${id}`).remove();
    calculateTotal();
}

async function verifyAndCalc(id) {
    const zip = document.getElementById(`zip-${id}`).value;
    const city = document.getElementById(`city-${id}`).value;
    const btn = document.getElementById(`btn-${id}`);
    
    if(!zip || !city) { alert("Wpisz kod i miasto!"); return; }

    btn.innerHTML = '<span class="loader"></span> Szukam...';
    
    try {
        const res = await fetch(`https://photon.komoot.io/api/?q=${zip}+${city}&limit=1&countrycode=de`);
        const data = await res.json();
        
        if(data.features && data.features.length > 0) {
            const coord = data.features[0].geometry.coordinates;
            document.getElementById(`lat-${id}`).value = coord[1];
            document.getElementById(`lng-${id}`).value = coord[0];
            
            btn.innerText = "✓ Zatwierdzono";
            btn.classList.add('verified');
            document.getElementById(`row-${id}`).classList.add('ready');
            document.getElementById(`stats-${id}`).style.display = 'flex';
            
            calculateTotal();
        } else {
            alert("Nie znaleziono adresu. Sprawdź kod pocztowy.");
            btn.innerText = "Zatwierdź punkt";
        }
    } catch(e) {
        alert("Błąd połączenia.");
        btn.innerText = "Zatwierdź punkt";
    }
}

async function calculateTotal() {
    const rows = Array.from(document.querySelectorAll('.point-row.ready'));
    let coords = [`${HOME.lng},${HOME.lat}`];
    let inspections = rows.length;

    rows.forEach(row => {
        const id = row.id.split('-')[1];
        coords.push(`${document.getElementById(`lng-${id}`).value},${document.getElementById(`lat-${id}`).value}`);
    });

    if(inspections === 0) { resetSummary(); return; }
    
    coords.push(`${HOME.lng},${HOME.lat}`);

    try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords.join(';')}?overview=false`);
        const data = await res.json();
        
        if(data.routes && data.routes[0]) {
            const r = data.routes[0];
            const dist = r.distance / 1000;
            const fuel = Math.max(25, dist * PRICE_KM);
            const insp = inspections * PRICE_INSP;

            document.getElementById('total-dist').innerText = dist.toFixed(1) + ' km';
            document.getElementById('total-time').innerText = Math.floor(r.duration/3600) + 'h ' + Math.floor((r.duration%3600)/60) + 'm';
            document.getElementById('total-fuel').innerText = fuel.toFixed(2) + ' €';
            document.getElementById('total-insp').innerText = insp.toFixed(2) + ' €';
            document.getElementById('total-all').innerText = (fuel + insp).toFixed(2) + ' €';
        }
    } catch(e) { console.error(e); }
}

function resetSummary() {
    document.getElementById('total-dist').innerText = '0 km';
    document.getElementById('total-fuel').innerText = '0,00 €';
    document.getElementById('total-insp').innerText = '0,00 €';
    document.getElementById('total-all').innerText = '0,00 €';
}

addNewPoint();
</script>
</body>
</html>
